<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>识字卡片</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#FFFEF5;--card:#FFFFFF;--text:#2C2C2A;--muted:#888780;--border:#E8E6DF;
  --purple:#7F77DD;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --green:#639922;--green-l:#EAF3DE;--green-d:#27500A;
  --coral:#D85A30;--coral-l:#FAECE7;--coral-d:#993C1D;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-d:#633806;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-d:#085041;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:var(--text);min-height:100vh;}

/* ===== TABS ===== */
.tabs{display:flex;gap:8px;padding:12px 16px 0;max-width:520px;margin:0 auto;}
.tab{flex:1;padding:8px;text-align:center;font-size:14px;font-weight:500;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;}
.tab.active{background:var(--purple-l);color:var(--purple-d);border-color:#AFA9EC;}

.view{display:none;max-width:520px;margin:0 auto;padding:12px 16px 80px;}
.view.active{display:block;}

/* ===== STUDY VIEW ===== */
.session-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.session-header h2{font-size:15px;font-weight:500;color:var(--text);}
.session-header .prog-txt{font-size:13px;color:var(--muted);}
.progress-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:14px;overflow:hidden;}
.progress-fill{height:100%;background:var(--purple);border-radius:3px;transition:width .4s ease;}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 20px 22px;text-align:center;position:relative;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:12px;}
.card-badge{position:absolute;top:14px;left:16px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}
.badge-new{background:var(--teal-l);color:var(--teal-d);}
.badge-review{background:var(--amber-l);color:var(--amber-d);}
.card-level{position:absolute;top:14px;right:16px;font-size:11px;color:var(--muted);}

.pinyin{font-size:24px;color:var(--purple);margin-bottom:4px;letter-spacing:3px;min-height:32px;}
.hanzi{font-size:110px;line-height:1.05;color:var(--text);cursor:pointer;user-select:none;transition:transform .08s;margin:4px 0;}
.hanzi:active{transform:scale(0.93);}
.stroke-info{font-size:13px;color:var(--muted);margin-top:2px;}
.example-box{margin-top:10px;font-size:16px;color:var(--muted);line-height:1.7;}
.example-box .hl{color:var(--purple-d);font-weight:500;}
.tap-hint{font-size:11px;color:var(--muted);opacity:.5;margin-top:6px;}

.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.btn{border:none;border-radius:16px;padding:14px 10px;font-size:15px;font-weight:500;cursor:pointer;transition:transform .08s,opacity .1s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.btn:active{transform:scale(0.96);}
.btn-icon{font-size:26px;}
.btn-know{background:var(--green-l);color:var(--green-d);}
.btn-forget{background:var(--coral-l);color:var(--coral-d);}
.btn-skip{width:100%;background:transparent;border:1px solid var(--border);border-radius:14px;padding:10px;font-size:14px;color:var(--muted);cursor:pointer;}
.btn-skip:active{background:var(--border);}

/* ===== COMPLETE ===== */
.complete{text-align:center;padding:24px 8px;}
.complete-emoji{font-size:64px;margin-bottom:12px;}
.complete h3{font-size:22px;font-weight:500;margin-bottom:6px;}
.complete p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px;}
.summary-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.sum-item{background:var(--border);border-radius:14px;padding:12px 18px;text-align:center;flex:1;}
.sum-num{font-size:26px;font-weight:500;}
.sum-lbl{font-size:12px;color:var(--muted);margin-top:2px;}
.btn-again{background:var(--purple-l);color:var(--purple-d);border:none;border-radius:14px;padding:12px 36px;font-size:15px;font-weight:500;cursor:pointer;}

/* ===== MANAGE VIEW ===== */
.manage-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.manage-top h3{font-size:15px;font-weight:500;}
.manage-top span{font-size:13px;color:var(--muted);}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.filter-btn{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;}
.filter-btn.on{background:var(--purple-l);color:var(--purple-d);border-color:#AFA9EC;}
.word-grid{display:grid;gap:6px;}
.word-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 14px;}
.wchar{font-size:34px;min-width:44px;text-align:center;}
.winfo{flex:1;}
.wpin{font-size:13px;color:var(--purple);}
.wstat{font-size:12px;color:var(--muted);margin-top:1px;}
.wbadge{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.b-new{background:var(--teal-l);color:var(--teal-d);}
.b-rev{background:var(--amber-l);color:var(--amber-d);}
.b-ok{background:var(--green-l);color:var(--green-d);}
.wreset{border:none;background:none;font-size:16px;cursor:pointer;padding:4px;color:var(--muted);}

/* ===== SETTINGS VIEW ===== */
.setting-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.setting-section h4{font-size:13px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;}
.setting-row label{font-size:15px;color:var(--text);}
.setting-row input[type=range]{width:120px;}
.setting-row select{border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:14px;background:var(--bg);color:var(--text);}
.setting-val{font-size:14px;color:var(--purple);min-width:28px;text-align:right;}
.danger-btn{width:100%;background:var(--coral-l);color:var(--coral-d);border:none;border-radius:12px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;}
.info-box{background:var(--purple-l);border-radius:12px;padding:12px;font-size:13px;color:var(--purple-d);line-height:1.6;margin-bottom:12px;}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(44,44,42,.88);color:#fff;padding:9px 20px;border-radius:20px;font-size:14px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('study')">今天学习</button>
  <button class="tab" onclick="showTab('manage')">字库</button>
  <button class="tab" onclick="showTab('settings')">设置</button>
</div>

<div class="view active" id="view-study">
  <div id="study-content"></div>
</div>

<div class="view" id="view-manage">
  <div class="manage-top">
    <h3>全部汉字</h3>
    <span id="manage-stat"></span>
  </div>
  <div class="filter-row">
    <button class="filter-btn on" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" onclick="setFilter('new',this)">未学</button>
    <button class="filter-btn" onclick="setFilter('review',this)">复习中</button>
    <button class="filter-btn" onclick="setFilter('known',this)">已掌握</button>
  </div>
  <div class="word-grid" id="word-grid"></div>
</div>

<div class="view" id="view-settings">
  <div class="info-box">📖 字表来自《四五快读》1-6册，共552个核心汉字，按儿童认知规律排序（具象→抽象）。后续字来自小学常用字频表。</div>
  <div class="setting-section">
    <h4>学习设置</h4>
    <div class="setting-row">
      <label>每天新字数</label>
      <input type="range" min="1" max="6" value="3" id="set-new" oninput="updateSetting('newPerDay',+this.value);document.getElementById('val-new').textContent=this.value">
      <span class="setting-val" id="val-new">3</span>
    </div>
  </div>
  <div class="setting-section">
    <h4>复习间隔（艾宾浩斯）</h4>
    <div class="setting-row" style="font-size:13px;color:var(--muted);display:block;line-height:1.8;">
      认识后：当天 → 1天后 → 3天后 → 7天后 → 14天后 → 30天后 → 毕业✓
    </div>
  </div>
  <div class="setting-section">
    <h4>数据管理</h4>
    <button class="danger-btn" onclick="resetAll()">⚠️ 清除所有学习记录（重新开始）</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const seen = new Set();
const WORDS = WORDS_RAW.filter(w => {
  if (seen.has(w[0])) return false;
  seen.add(w[0]);
  return true;
}).map((w, i) => ({
  char: w[0], pinyin: w[1], strokes: w[2], example: w[3], order: i
}));

// ===== STATE =====
const INTERVALS_DAYS = [0, 1, 3, 7, 14, 30, 90]; // level 0=new, 1-6=review stages, 7=graduated

function defaultState() {
  return {
    words: WORDS.map(w => ({
      char: w.char, level: 0,
      nextReview: Date.now(),
      correct: 0, total: 0,
      order: w.order
    })),
    settings: { newPerDay: 3 },
    todayNew: 0,
    lastDate: new Date().toDateString()
  };
}

let S = loadState();

function loadState() {
  try {
    const s = localStorage.getItem('shizi_v3');
    if (!s) return defaultState();
    const parsed = JSON.parse(s);
    // migrate if new words added
    const existChars = new Set(parsed.words.map(w => w.char));
    WORDS.forEach(w => {
      if (!existChars.has(w.char)) {
        parsed.words.push({ char: w.char, level: 0, nextReview: Date.now(), correct: 0, total: 0, order: w.order });
      }
    });
    return parsed;
  } catch(e) { return defaultState(); }
}

function saveState() {
  try { localStorage.setItem('shizi_v3', JSON.stringify(S)); } catch(e) {}
}

function checkNewDay() {
  const today = new Date().toDateString();
  if (S.lastDate !== today) { S.todayNew = 0; S.lastDate = today; saveState(); }
}

function getWordMeta(char) {
  return WORDS.find(w => w.char === char);
}

function getDueCards() {
  checkNewDay();
  const now = Date.now();
  const maxNew = S.settings.newPerDay;
  const reviews = S.words.filter(w => w.level > 0 && w.level < 7 && w.nextReview <= now);
  reviews.sort((a, b) => a.nextReview - b.nextReview);
  const newSlots = maxNew - S.todayNew;
  const newCards = newSlots > 0 ? S.words.filter(w => w.level === 0).sort((a,b) => a.order - b.order).slice(0, newSlots) : [];
  return [...reviews, ...newCards];
}

// ===== STUDY STATE =====
let queue = [], qIdx = 0, sessKnown = 0, sessForgot = 0;

function initSession() {
  checkNewDay();
  queue = getDueCards();
  qIdx = 0; sessKnown = 0; sessForgot = 0;
}

// ===== RENDER =====
function renderStudy() {
  const el = document.getElementById('study-content');
  if (qIdx >= queue.length) { el.innerHTML = renderComplete(); return; }
  const wState = queue[qIdx];
  const meta = getWordMeta(wState.char);
  if (!meta) { qIdx++; renderStudy(); return; }
  const isNew = wState.level === 0;
  const total = queue.length;
  const pct = Math.round((qIdx / total) * 100);

  const exampleHtml = meta.example.replace('★', `<span class="hl">${meta.char}</span>`);

  el.innerHTML = `
    <div class="session-header">
      <h2>${isNew ? '✨ 今天新字' : '📖 复习'}</h2>
      <div class="prog-txt">${qIdx + 1} / ${total}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <span class="card-badge ${isNew ? 'badge-new' : 'badge-review'}">${isNew ? '新字' : '第' + wState.level + '关'}</span>
      <span class="card-level">${meta.strokes}画</span>
      <div class="pinyin">${meta.pinyin}</div>
      <div class="hanzi" onclick="speak('${meta.char}')">${meta.char}</div>
      <div class="example-box">${exampleHtml}</div>
      <div class="tap-hint">点大字听发音</div>
    </div>
    <div class="btns">
      <button class="btn btn-forget" onclick="answer(false)">
        <span class="btn-icon">🤔</span>还不认识
      </button>
      <button class="btn btn-know" onclick="answer(true)">
        <span class="btn-icon">⭐</span>认识啦！
      </button>
    </div>
    <button class="btn-skip" onclick="skipCard()">跳过这个字</button>
  `;
}

function answer(known) {
  const wState = queue[qIdx];
  const idx = S.words.findIndex(w => w.char === wState.char);
  if (idx === -1) { qIdx++; renderStudy(); return; }
  S.words[idx].total++;
  if (known) {
    sessKnown++;
    const newLevel = Math.min(wState.level + 1, 7);
    S.words[idx].level = newLevel;
    S.words[idx].correct++;
    if (wState.level === 0) S.todayNew++;
    if (newLevel < 7) {
      S.words[idx].nextReview = Date.now() + INTERVALS_DAYS[newLevel] * 86400000;
    }
  } else {
    sessForgot++;
    S.words[idx].level = Math.max(0, wState.level - 1);
    S.words[idx].nextReview = Date.now();
    if (wState.level === 0) S.todayNew = Math.max(0, S.todayNew - 0); // don't penalize new count
  }
  saveState();
  qIdx++;
  renderStudy();
}

function skipCard() { qIdx++; renderStudy(); }

function renderComplete() {
  const now = Date.now();
  const dueTomorrow = S.words.filter(w => {
    const d = (w.nextReview - now) / 86400000;
    return w.level > 0 && w.level < 7 && d > 0 && d < 1.5;
  }).length;
  const graduated = S.words.filter(w => w.level >= 7).length;
  const learned = S.words.filter(w => w.level > 0).length;
  const emoji = sessKnown >= queue.length * 0.7 ? '🌟' : '💪';
  const msg = sessKnown >= queue.length * 0.7 ? '太厉害了！' : '继续努力！';
  return `
    <div class="complete">
      <div class="complete-emoji">${emoji}</div>
      <h3>${msg}</h3>
      <p>今天学了 <b>${S.todayNew}</b> 个新字<br>累计认识 <b>${learned}</b> 字 · 毕业 <b>${graduated}</b> 字<br>明天还要复习 <b>${dueTomorrow}</b> 个字哦</p>
      <div class="summary-row">
        <div class="sum-item"><div class="sum-num" style="color:#639922">${sessKnown}</div><div class="sum-lbl">认识</div></div>
        <div class="sum-item"><div class="sum-num" style="color:#D85A30">${sessForgot}</div><div class="sum-lbl">还在学</div></div>
        <div class="sum-item"><div class="sum-num">${queue.length}</div><div class="sum-lbl">共练习</div></div>
      </div>
      <button class="btn-again" onclick="initSession();renderStudy()">再来一轮</button>
    </div>
  `;
}

// ===== MANAGE =====
let manageFilter = 'all';

function setFilter(f, btn) {
  manageFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderManage();
}

function renderManage() {
  const now = Date.now();
  let words = S.words.map(w => ({ ...w, meta: getWordMeta(w.char) })).filter(w => w.meta);
  if (manageFilter === 'new') words = words.filter(w => w.level === 0);
  else if (manageFilter === 'review') words = words.filter(w => w.level > 0 && w.level < 7);
  else if (manageFilter === 'known') words = words.filter(w => w.level >= 7);
  words.sort((a, b) => a.meta.order - b.meta.order);

  const total = S.words.length;
  const learned = S.words.filter(w => w.level > 0).length;
  const graduated = S.words.filter(w => w.level >= 7).length;
  document.getElementById('manage-stat').textContent = `${learned}/${total}字 · 毕业${graduated}`;

  const grid = document.getElementById('word-grid');
  grid.innerHTML = words.map(w => {
    const due = w.level > 0 && w.level < 7 && w.nextReview <= now;
    const isNew = w.level === 0;
    const isGrad = w.level >= 7;
    const badgeCls = isNew ? 'b-new' : isGrad ? 'b-ok' : due ? 'b-rev' : 'b-ok';
    const badgeTxt = isNew ? '未学' : isGrad ? '毕业✓' : due ? '待复习' : `第${w.level}关`;
    const acc = w.total > 0 ? Math.round(w.correct / w.total * 100) + '%' : '-';
    return `<div class="word-row">
      <div class="wchar">${w.char}</div>
      <div class="winfo">
        <div class="wpin">${w.meta.pinyin}</div>
        <div class="wstat">${w.meta.strokes}画 · 正确率${acc}</div>
      </div>
      <span class="wbadge ${badgeCls}">${badgeTxt}</span>
      ${!isNew ? `<button class="wreset" onclick="resetWord('${w.char}')" title="重置为未学">↺</button>` : ''}
    </div>`;
  }).join('');
}

function resetWord(char) {
  const idx = S.words.findIndex(w => w.char === char);
  if (idx === -1) return;
  S.words[idx].level = 0;
  S.words[idx].nextReview = Date.now();
  S.words[idx].correct = 0;
  S.words[idx].total = 0;
  saveState();
  renderManage();
  toast('已重置为未学');
}

// ===== SETTINGS =====
function updateSetting(key, val) {
  S.settings[key] = val;
  saveState();
}

function resetAll() {
  if (confirm('确定要清除所有学习记录吗？重新开始学习。')) {
    localStorage.removeItem('shizi_v3');
    S = defaultState();
    saveState();
    initSession();
    renderStudy();
    renderManage();
    toast('已重置，重新开始！');
    showTab('study');
  }
}

// ===== SPEECH =====
function speak(char) {
  if (!('speechSynthesis' in window)) { toast('您的浏览器不支持语音'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(char);
  u.lang = 'zh-CN';
  u.rate = 0.75;
  u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== TABS =====
function showTab(tab) {
  ['study','manage','settings'].forEach(t => {
    document.getElementById('view-' + t).classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['study','manage','settings'][i] === tab);
  });
  if (tab === 'manage') renderManage();
  if (tab === 'settings') {
    const el = document.getElementById('set-new');
    el.value = S.settings.newPerDay;
    document.getElementById('val-new').textContent = S.settings.newPerDay;
  }
}

// ===== INIT =====
initSession();
renderStudy();
</script>
